</span> *predicate = [<span class="built_in">NSPredicate</span> predicateWithFormat:<span class="string">@"SELF MATCHES %@"</span>, regex];</div><div class="line">    <span class="keyword">if</span> (![predicate evaluateWithObject:idNumber]) <span class="keyword">return</span> <span class="literal">NO</span>;</div><div class="line">    <span class="comment">// 省份代码。如果需要更精确的话，可以把六位行政区划代码都列举出来比较。</span></div><div class="line">    <span class="built_in">NSString</span> *provinceCode = [idNumber substringToIndex:<span class="number">2</span>];</div><div class="line">    <span class="built_in">NSArray</span> *proviceCodes = @[<span class="string">@"11"</span>, <span class="string">@"12"</span>, <span class="string">@"13"</span>, <span class="string">@"14"</span>, <span class="string">@"15"</span>,</div><div class="line">                              <span class="string">@"21"</span>, <span class="string">@"22"</span>, <span class="string">@"23"</span>,</div><div class="line">                              <span class="string">@"31"</span>, <span class="string">@"32"</span>, <span class="string">@"33"</span>, <span class="string">@"34"</span>, <span class="string">@"35"</span>, <span class="string">@"36"</span>, <span class="string">@"37"</span>,</div><div class="line">                              <span class="string">@"41"</span>, <span class="string">@"42"</span>, <span class="string">@"43"</span>, <span class="string">@"44"</span>, <span class="string">@"45"</span>, <span class="string">@"46"</span>,</div><div class="line">                              <span class="string">@"50"</span>, <span class="string">@"51"</span>, <span class="string">@"52"</span>, <span class="string">@"53"</span>, <span class="string">@"54"</span>,</div><div class="line">                              <span class="string">@"61"</span>, <span class="string">@"62"</span>, <span class="string">@"63"</span>, <span class="string">@"64"</span>, <span class="string">@"65"</span>,</div><div class="line date18DigitsIDCardNumber:(<span class="built_in">NSString</span> *)idNumber &#123;</div><div class="line">    <span class="built_in">NSString</span> *birthday = [idNumber substringWithRange:<span class="built_in">NSMakeRange</span>(<span class="number">6</span>, <span class="number">8</span>)];</div><div class="line">    <span class="keyword">if</span> (![<span class="keyword">self</span> validateBirthDate:birthday]) <span class="keyword">return</span> <span class="literal">NO</span>;</div><div class="line">    </div><div class="line">    <span class="comment">// 验证校验码</span></div><div class="line">    <span class="keyword">int</span> weight[] = &#123;<span class="number">7</span>,<span class="number">9</span>,<span class="number">10</span>,<span class="number">5</span>,<span class="number">8</span>,<span class="number">4</span>,<span class="number">2</span>,<span class="number">1</span>,<span class="number">6</span>,<span class="number">3</span>,<span class="number">7</span>,<span class="number">9</span>,<span class="number">10</span>,<span class="number">5</span>,<span class="number">8</span>,<span class="number">4</span>,<span class="number">2</span>&#125;;</div><div class="line">    </div><div class="line">    <span class="keyword">int</span> sum = <span class="number">0</span>;</div><div class="line">    <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">0</span>; i &lt; <span class="number">17</span>; i ++) &#123;</div><div class="line">        sum += [idNumber substringWithRange:<span class="built_in">NSMakeRange</span>(i, <span class="number">1</span>)].intValue * weight[i];</div><div class="line">    &#125;</div><div class="line">    <span class="keyword">int</span> mod11 = sum % <span class="number">11</span>;</div><div class="line">    <span class="built_in">NSArray</span>&lt;<span class="built_in">NSString</span> *&gt; *validationCodes = [<span class="string">@"1 0 X 9 8 7 6 5 4 3 2"</span> componentsSeparatedByString:<span class="string">@" "</span>];</div><div class="line">    <span class="built_in">NSString</span> *validationCode = validationCodes[mod11];</div><div class="line">    </div><div class="line">    <span class="keyword">return</span> [idNumber hasSuffix:validationCode];</div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="comment">/// 验证出生年月日(yyyyMMdd)</span></div><div class="line">+ (<span class="built_in">BOOL</span>)validateBirthDate:(<span class="built_in">NSString</span> *)birthDay &#123;</div><div class="line">    <span class="built_in">NSDateFormatter</span> *dateFormatter = [[<span class="built_in">NSDateFormatter</span> alloc] init];</div><div class="line">    dateFormatter.dateFormat = <span class="string">@"yyyyMMdd"</span>;</div><div class="line">    <span class="built_in">NSDate</span> *date = [dateFormatter dateFromString:birthDay];</div><div class="line">    <span class="keyword">return</span> date != <span class="literal">nil</span>;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
